name: Update standings and deploy to GitHub Pages

on:
  schedule:
    - cron: "*/5 * * * *"    # best-effort; deploys only when results change
  workflow_dispatch:
    inputs:
      api_football_mode:
        description: "Uso da API-Football nesta execução"
        required: false
        default: "smart"
        type: choice
        options:
          - smart
          - always
          - never
  push:
    branches: [main]

permissions:
  contents: write   # to commit refreshed JSON back to the repo
  pages: write      # to publish to GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch results and recompute standings
        env:
          RESULTS_SOURCE: fast
          API_FOOTBALL_MODE: ${{ github.event.inputs.api_football_mode || 'smart' }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: npm run update

      - name: Commit refreshed standings if changed
        id: refresh
        run: |
          git config user.name "bolao-bot"
          git config user.email "bolao-bot@users.noreply.github.com"
          git add data/results.json data/standings.json data/live-results.json data/live-standings.json data/bracket.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update standings [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        if: github.event_name != 'schedule' || steps.refresh.outputs.changed == 'true'
        env:
          NEXT_PUBLIC_BASE_PATH: /bolaocopa   # must match the repository name
        run: npm run build

      - name: Add .nojekyll (serve _next assets verbatim)
        if: github.event_name != 'schedule' || steps.refresh.outputs.changed == 'true'
        run: touch ./out/.nojekyll

      - name: Setup Pages
        if: github.event_name != 'schedule' || steps.refresh.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'schedule' || steps.refresh.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        if: github.event_name != 'schedule' || steps.refresh.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
